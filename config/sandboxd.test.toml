# sandboxd test configuration
# Settings for integration testing — enough warm containers for parallel SDK tests.

[server]
socket = "/var/run/sandboxd/sandboxd.sock"
tcp = "0.0.0.0:7522"
data_dir = "/var/lib/sandboxd"

[limits]
max_sandboxes = 20
max_memory = "2g"
max_cpu = 4.0
create_rate_limit = 200
max_ttl = 3600
max_templates = 10
max_template_size = "512m"
template_expiry_days = 0
tunnel_bind_address = "0.0.0.0"  # 0.0.0.0 so tunnel ports are reachable from host when running in Docker
tunnel_port_min = 10000
tunnel_port_max = 10100

[network]
bridge_name = "sandboxd-test-net"

[pool]
total_warm = 8
min_per_image = 0
min_base = 5
max_warm = 10
rebalance_window = "1h"
health_interval = "10s"
liveness_timeout = "10s"

[pool.base.default]
image = "sandbox-test-base:latest"
memory = "256m"
cpu = 1.0
