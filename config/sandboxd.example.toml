# sandboxd configuration
# Supports hot-reload on file change or SIGHUP.
# Listen addresses (socket, tcp) require a restart.

[server]
socket = "/var/run/sandboxd/sandboxd.sock"
tcp = ""                          # empty = disabled, "0.0.0.0:7522" to enable
tls_cert = ""                     # TLS certificate for TCP listener (empty = plaintext)
tls_key = ""                      # TLS private key for TCP listener
data_dir = "/var/lib/sandboxd"
node_id = ""                      # short node tag embedded in sandbox IDs (e.g. "eu1" → sbx-eu1-a3f2c1)

# Multi-tenant mode: when enabled, all API requests (except /health and
# /metrics) must carry a valid Ed25519 signature proving the identity and
# limit headers were set by a trusted proxy.
#
# The signed payload includes the HTTP method, path, and these headers:
#   X-Sandbox-Identity:       the caller's identity
#   X-Sandbox-Max-Concurrent: max concurrent sandboxes for this identity
#   X-Sandbox-Max-TTL:        max session TTL in seconds
#   X-Sandbox-Max-Templates:  max templates for this identity
#   X-Sandbox-Timestamp:      Unix epoch second when the proxy signed the request
#   X-Sandbox-Signature:      base64 Ed25519 signature over the above
#
# Signatures expire after 30 seconds to prevent replay attacks.
#
# Generate a keypair:  openssl genpkey -algorithm ed25519 -out proxy.pem
#                       openssl pkey -in proxy.pem -pubout -outform DER | base64

[multi_tenant]
enabled = false
public_keys = []                  # base64-encoded Ed25519 public keys; multiple for rotation

[limits]
max_sandboxes = 100
max_memory = "4g"
max_cpu = 4.0
max_ttl = 86400                   # 24 hours
max_templates = 50
max_template_size = "2g"
template_expiry_days = 60         # unused templates auto-deleted, 0 = never
create_rate_limit = 20            # max sandbox creations per identity per minute
tunnel_bind_address = "127.0.0.1" # bind address for tunnel listeners ("0.0.0.0" when running in Docker)

[network]
bridge_name = "sandboxd-net"      # dedicated Docker bridge network

[pool]
total_warm = 30                   # total warm slots across all images
min_per_image = 0                 # minimum warm slots per tracked image
min_base = 2                      # minimum warm slots per base image
max_warm = 60                     # autoscale ceiling for total budget
rebalance_window = "1h"           # sliding window for frequency tracking
health_interval = "10s"           # periodic agent health check
liveness_timeout = "5ms"          # ping timeout on warm pool assignment

[pool.base.default]
image = "byggflow/sandbox-base:latest"
memory = "512m"
cpu = 1.0
storage = "500m"              # tmpfs size for /root workspace

[pool.base.python]
image = "byggflow/sandbox-python:latest"
memory = "1g"
cpu = 2.0
storage = "1g"

# Isolation levels:
#   "docker"        - namespaces, seccomp, dropped caps (default)
#   "docker+gvisor" - userspace kernel via gVisor runsc (requires runsc installed)
#   "firecracker"   - separate kernel in KVM microVM
#
# [pool.base.secure]
# image = "byggflow/sandbox-base:latest"
# memory = "512m"
# cpu = 1.0
# storage = "500m"
# runtime = "docker+gvisor"
