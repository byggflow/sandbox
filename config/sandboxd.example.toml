# sandboxd configuration
# Supports hot-reload on file change or SIGHUP.
# Listen addresses (socket, tcp) require a restart.

[server]
socket = "/var/run/sandboxd/sandboxd.sock"
tcp = ""                          # empty = disabled, "0.0.0.0:7522" to enable
data_dir = "/var/lib/sandboxd"
node_id = ""                      # short node tag embedded in sandbox IDs (e.g. "eu1" → sbx-eu1-a3f2c1)

# Multi-tenant mode is activated automatically when requests include the
# X-Sandbox-Identity header (typically set by a proxy). Per-identity limits
# are set via request headers, not config:
#
#   X-Sandbox-Identity:      the caller's identity
#   X-Sandbox-Max-Concurrent: max concurrent sandboxes for this identity
#   X-Sandbox-Max-TTL:        max session TTL in seconds for this identity
#   X-Sandbox-Max-Templates:  max templates for this identity
#
# Global config limits below act as hard ceilings that headers cannot exceed.

[limits]
max_sandboxes = 100
max_memory = "4g"
max_cpu = 4.0
max_ttl = 86400                   # 24 hours
max_templates = 50
max_template_size = "2g"
template_expiry_days = 60         # unused templates auto-deleted, 0 = never

[network]
bridge_name = "sandboxd-net"      # dedicated Docker bridge network
icc = false                       # inter-container communication disabled

[pool]
total_warm = 30                   # total warm slots across all images
min_per_image = 0                 # minimum warm slots per tracked image
min_base = 2                      # minimum warm slots per base image
max_warm = 60                     # autoscale ceiling for total budget
rebalance_window = "1h"           # sliding window for frequency tracking
health_interval = "10s"           # periodic agent health check
liveness_timeout = "5ms"          # ping timeout on warm pool assignment

[pool.base.default]
image = "byggflow/sandbox-base:latest"
memory = "512m"
cpu = 1.0

[pool.base.python]
image = "byggflow/sandbox-python:latest"
memory = "1g"
cpu = 2.0
