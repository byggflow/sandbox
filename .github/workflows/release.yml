name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  binaries:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build sandboxd
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o sandboxd ./cmd/sandboxd

      - name: Build sbx
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o sbx ./cmd/sbx

      - name: Build sandbox-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o sandbox-agent ./cmd/sandbox-agent

      - name: Package
        run: |
          tag="${{ github.ref_name }}"
          os="${{ matrix.goos }}"
          arch="${{ matrix.goarch }}"

          tar czf "sandbox-${tag}-${os}-${arch}.tar.gz" sandboxd sbx sandbox-agent

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: "*.tar.gz"

  release:
    name: GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            checksums.txt

  npm:
    name: Publish npm packages
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd sdk/typescript && npm pkg set version="$VERSION"
          cd ../../mcp && npm pkg set version="$VERSION"

      - name: Build SDK
        run: cd sdk/typescript && bun install && bun run build

      - name: Publish SDK to npm
        run: cd sdk/typescript && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build MCP
        run: cd mcp && bun install && bun run build

      - name: Publish MCP to npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd mcp && npm pkg set dependencies.'@byggflow/sandbox'="^$VERSION" && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  jsr:
    name: Publish SDK to JSR
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd sdk/typescript && jq --arg v "$VERSION" '.version = $v' jsr.json > tmp.json && mv tmp.json jsr.json

      - name: Install dependencies
        run: cd sdk/typescript && npm install

      - name: Publish to JSR
        run: cd sdk/typescript && npx jsr publish --allow-dirty

  # TODO: uncomment when PyPI org is approved
  # pypi:
  #   name: Publish Python SDK
  #   needs: release
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/checkout@v4
  #
  #     - uses: actions/setup-python@v5
  #       with:
