name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: make build-sandboxd build-sbx build-agent

  typescript:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: cd sdk/typescript && bun install --frozen-lockfile

      - name: Build
        run: cd sdk/typescript && bun run build

      - name: Test
        run: cd sdk/typescript && bunx --bun vitest run

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install
        run: pip install -e "sdk/python[dev]"

      - name: Test
        run: python -m pytest sdk/python/tests/ -v

  mcp:
    name: MCP server
    needs: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SDK
        run: cd sdk/typescript && bun install --frozen-lockfile && bun run build

      - name: Install
        run: cd mcp && bun install --frozen-lockfile

      - name: Build
        run: cd mcp && bun run build

      - name: Test
        run: cd mcp && bunx --bun vitest run

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [go, typescript, python]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: sdk/python/pyproject.toml

      - name: Install TypeScript SDK
        run: cd sdk/typescript && bun install --frozen-lockfile && bun run build

      - name: Install Python SDK
        run: pip install -e "sdk/python[dev]"

      - name: Run integration tests
        run: make test-integration-native
