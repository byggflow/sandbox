services:
  # Build the test base image (sandbox with agent baked in).
  # This service exits immediately — it only exists to produce the image.
  test-base-build:
    image: sandbox-test-base:latest
    build:
      context: .
      dockerfile: images/base/Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    entrypoint: ["echo", "base image built"]
    restart: "no"

  sandboxd:
    build:
      context: .
      dockerfile: images/sandboxd/Dockerfile
      args:
        TARGETARCH: ${TARGETARCH:-amd64}
    command: ["--config", "/etc/sandboxd/config.toml"]
    ports:
      - "7522:7522"
    networks:
      - sandboxd-test-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - sandboxd-socket:/var/run/sandboxd
      - ./config/sandboxd.test.toml:/etc/sandboxd/config.toml:ro
    depends_on:
      test-base-build:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7522/health"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

networks:
  # Pre-create the bridge network with ICC enabled so sandboxd (running as a
  # container) can reach agent containers. On Linux where sandboxd runs on the
  # host, the daemon creates this network with ICC disabled for sandbox
  # isolation — host-to-container traffic bypasses ICC restrictions.
  # In Docker-in-Docker (macOS, CI), we need ICC enabled.
  sandboxd-test-net:
    name: sandboxd-test-net
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

volumes:
  sandboxd-socket:
